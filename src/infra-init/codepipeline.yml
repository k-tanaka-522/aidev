AWSTemplateFormatVersion: '2010-09-09'
Description: 'aiDev CodePipeline'

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    Description: Environment name (dev, staging, prod)
    AllowedValues:
      - dev
      - staging
      - prod
  
  CodePipelineServiceRoleArn:
    Type: String
    Description: ARN of the CodePipeline service role
  
  CodeCommitRepositoryName:
    Type: String
    Description: Name of the CodeCommit repository
  
  ArtifactBucketName:
    Type: String
    Description: Name of the S3 bucket for artifacts
  
  FrontendBuildProjectName:
    Type: String
    Description: Name of the frontend build project
  
  BackendBuildProjectName:
    Type: String
    Description: Name of the backend build project
  
  InfrastructureBuildProjectName:
    Type: String
    Description: Name of the infrastructure build project

Resources:
  # CodePipeline
  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub aiDev-${EnvironmentName}-pipeline
      RoleArn: !Ref CodePipelineServiceRoleArn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucketName
      Stages:
        # Source Stage
        - Name: Source
          Actions:
            - Name: Source
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeCommit
                Version: 1
              Configuration:
                RepositoryName: !Ref CodeCommitRepositoryName
                BranchName: !Sub ${EnvironmentName}
                PollForSourceChanges: false
              OutputArtifacts:
                - Name: SourceCode
        
        # Build Stage
        - Name: Build
          Actions:
            # Infrastructure Build
            - Name: BuildInfrastructure
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: 1
              Configuration:
                ProjectName: !Ref InfrastructureBuildProjectName
              InputArtifacts:
                - Name: SourceCode
              OutputArtifacts:
                - Name: InfrastructureBuildOutput
              RunOrder: 1
            
            # Backend Build
            - Name: BuildBackend
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: 1
              Configuration:
                ProjectName: !Ref BackendBuildProjectName
              InputArtifacts:
                - Name: SourceCode
              OutputArtifacts:
                - Name: BackendBuildOutput
              RunOrder: 1
            
            # Frontend Build
            - Name: BuildFrontend
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: 1
              Configuration:
                ProjectName: !Ref FrontendBuildProjectName
              InputArtifacts:
                - Name: SourceCode
              OutputArtifacts:
                - Name: FrontendBuildOutput
              RunOrder: 1
        
        # Deploy Stage
        - Name: Deploy
          Actions:
            # Deploy Infrastructure
            - Name: DeployInfrastructure
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: 1
              Configuration:
                ActionMode: CREATE_UPDATE
                StackName: !Sub aiDev-${EnvironmentName}-infrastructure
                TemplatePath: InfrastructureBuildOutput::packaged-template.yaml
                TemplateConfiguration: InfrastructureBuildOutput::config.json
                Capabilities: CAPABILITY_IAM,CAPABILITY_NAMED_IAM,CAPABILITY_AUTO_EXPAND
                RoleArn: !Ref CodePipelineServiceRoleArn
              InputArtifacts:
                - Name: InfrastructureBuildOutput
              RunOrder: 1
            
            # Deploy Frontend
            - Name: DeployFrontend
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: S3
                Version: 1
              Configuration:
                BucketName: !Sub aidev-frontend-${AWS::AccountId}-${EnvironmentName}
                Extract: true
              InputArtifacts:
                - Name: FrontendBuildOutput
              RunOrder: 2
      
      Tags:
        - Key: Project
          Value: aiDev
        - Key: Environment
          Value: !Ref EnvironmentName

# Create CloudWatch Event for CodeCommit Repository
  CloudWatchEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub aiDev-${EnvironmentName}-codecommit-event
      Description: Rule for CodeCommit repository changes
      EventPattern:
        source:
          - aws.codecommit
        detail-type:
          - 'CodeCommit Repository State Change'
        resources:
          - !Sub arn:aws:codecommit:${AWS::Region}:${AWS::AccountId}:${CodeCommitRepositoryName}
        detail:
          event:
            - referenceCreated
            - referenceUpdated
          referenceType:
            - branch
          referenceName:
            - !Sub ${EnvironmentName}
      State: ENABLED
      Targets:
        - Arn: !Sub arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${Pipeline}
          Id: CodePipelineTarget
          RoleArn: !GetAtt CloudWatchEventRole.Arn

  # IAM Role for CloudWatch Events
  CloudWatchEventRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: cwe-pipeline-execution
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: codepipeline:StartPipelineExecution
                Resource: !Sub arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${Pipeline}

Outputs:
  PipelineName:
    Description: Name of the CodePipeline
    Value: !Ref Pipeline
  
  PipelineUrl:
    Description: URL to the CodePipeline console
    Value: !Sub https://console.aws.amazon.com/codepipeline/home?region=${AWS::Region}#/view/${Pipeline}
