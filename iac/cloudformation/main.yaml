AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: aiDev プロジェクト メインテンプレート

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - stg
      - prod
    Description: デプロイ環境

  ApiGatewayStageName:
    Type: String
    Default: api
    Description: API Gatewayのステージ名

  LogRetentionInDays:
    Type: Number
    Default: 30
    Description: CloudWatchログの保持期間（日数）

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: nodejs18.x
    LoggingConfig:
      LogFormat: JSON
      ApplicationLogLevel: INFO
      SystemLogLevel: INFO
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment

Resources:
  # DynamoDB Tables
  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${Environment}-aidev-sessions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserIdIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  MessagesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${Environment}-aidev-messages
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
        - AttributeName: messageId
          AttributeType: S
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH
        - AttributeName: messageId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: MessageIdIndex
          KeySchema:
            - AttributeName: messageId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  ProjectsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${Environment}-aidev-projects
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: projectId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: projectId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserIdIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # API Gateway CloudWatch Logsロール
  ApiGatewayCloudWatchLogsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs'
      Path: "/"
      RoleName: !Sub "${Environment}-aidev-ApiGatewayCloudWatchLogsRole"

  # API Gateway CloudWatch設定
  ApiGatewayAccount:
    Type: AWS::ApiGateway::Account
    Properties:
      CloudWatchRoleArn: !GetAtt ApiGatewayCloudWatchLogsRole.Arn

  # API Gateway
  ApiGateway:
    Type: AWS::Serverless::Api
    DependsOn: 
      - ApiGatewayCloudWatchLogsRole
      - ApiGatewayAccount
    Properties:
      StageName: !Ref ApiGatewayStageName
      EndpointConfiguration:
        Type: REGIONAL
      TracingEnabled: true
      OpenApiVersion: 3.0.0
      AccessLogSetting:
        DestinationArn: !GetAtt ApiGatewayAccessLogGroup.Arn
        Format: '{\"requestId\":\"$context.requestId\",\"ip\":\"$context.identity.sourceIp\",\"requestTime\":\"$context.requestTime\",\"httpMethod\":\"$context.httpMethod\",\"routeKey\":\"$context.routeKey\",\"status\":\"$context.status\",\"protocol\":\"$context.protocol\",\"responseLength\":\"$context.responseLength\",\"integrationError\":\"$context.integrationErrorMessage\"}'

  # API Gateway用ロググループ
  ApiGatewayAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/apigateway/${Environment}-aidev
      RetentionInDays: !Ref LogRetentionInDays

  # S3バケット
  ContentBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${Environment}-aidev-content
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 30

  # ベーシックな関数（CI/CDパイプライン確認用）
  HelloWorldFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../src/lambda/hello-world/
      Handler: index.handler
      Description: 基本的な挨拶を返すHello World関数
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /hello
            Method: get
            
  # チャット処理関数
  ChatHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../src/lambda/chat_handler/
      Handler: index.handler
      Description: ユーザーとのチャット対話を処理する関数
      MemorySize: 512
      Timeout: 60
      Events:
        CreateSession:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /chat/sessions
            Method: post
        GetSession:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /chat/sessions/{sessionId}
            Method: get
        SendMessage:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /chat/sessions/{sessionId}/messages
            Method: post
        GetMessages:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /chat/sessions/{sessionId}/messages
            Method: get
      Environment:
        Variables:
          SESSIONS_TABLE: !Ref SessionsTable
          MESSAGES_TABLE: !Ref MessagesTable
          BEDROCK_MODEL_ID: "anthropic.claude-3-sonnet-20240229-v1:0"
          CONTENT_BUCKET: !Ref ContentBucket
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MessagesTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"
        - S3ReadPolicy:
            BucketName: !Ref ContentBucket

  # ナレッジベース検索関数
  KnowledgeSearchFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../src/lambda/knowledge-search/
      Handler: index.handler
      Description: ナレッジベースを検索する関数
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /knowledge/search
            Method: post
      Environment:
        Variables:
          CONTENT_BUCKET: !Ref ContentBucket
          SESSIONS_TABLE: !Ref SessionsTable
          MESSAGES_TABLE: !Ref MessagesTable
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref ContentBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MessagesTable

  # 環境構築エージェント関数
  EnvironmentBuilderFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../src/lambda/environment-builder/
      Handler: index.handler
      Description: 環境構築を自動化する関数
      Timeout: 300  # 長時間実行が必要なため、タイムアウトを5分に設定
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /environment/build
            Method: post
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          SESSIONS_TABLE: !Ref SessionsTable
          PROJECTS_TABLE: !Ref ProjectsTable
      # 実際の環境では適切な権限設定が必要
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ProjectsTable
        - Statement:
            - Effect: Allow
              Action:
                - cloudformation:DescribeStacks
                - cloudformation:CreateStack
                - cloudformation:UpdateStack
              Resource: !Sub arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${Environment}-aidev-*/*

  # Cognito User Pool
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub ${Environment}-aidev-user-pool
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: false
          RequireLowercase: false
          RequireNumbers: true
          RequireSymbols: false
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: name
          AttributeDataType: String
          Required: true
          Mutable: true
      UserPoolTags:
        Environment: !Ref Environment

  # Cognito User Pool Client
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub ${Environment}-aidev-client
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      RefreshTokenValidity: 30
      AccessTokenValidity: 60
      IdTokenValidity: 60
      TokenValidityUnits:
        RefreshToken: days
        AccessToken: minutes
        IdToken: minutes
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED
      
  # Cognito Identity Pool
  IdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: !Sub ${Environment}_aidev_identity_pool
      AllowUnauthenticatedIdentities: false
      CognitoIdentityProviders:
        - ClientId: !Ref UserPoolClient
          ProviderName: !GetAtt UserPool.ProviderName

  # IAM Role for authenticated users
  CognitoAuthenticatedRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${Environment}-aidev-cognito-authenticated-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                cognito-identity.amazonaws.com:aud: !Ref IdentityPool
              ForAnyValue:StringLike:
                cognito-identity.amazonaws.com:amr: authenticated
      Policies:
        - PolicyName: CognitoAuthenticatedPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - execute-api:Invoke
                Resource:
                  - !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*/*

  # Attach roles to identity pool
  IdentityPoolRoleAttachment:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref IdentityPool
      Roles:
        authenticated: !GetAtt CognitoAuthenticatedRole.Arn

Outputs:
  ApiEndpoint:
    Description: "API Gateway エンドポイント URL"
    Value: !Sub https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${ApiGatewayStageName}

  HelloWorldFunction:
    Description: "Hello World Lambda Function ARN"
    Value: !GetAtt HelloWorldFunction.Arn

  ChatHandlerFunction:
    Description: "Chat Handler Lambda Function ARN"
    Value: !GetAtt ChatHandlerFunction.Arn

  KnowledgeSearchFunction:
    Description: "Knowledge Search Lambda Function ARN"
    Value: !GetAtt KnowledgeSearchFunction.Arn

  EnvironmentBuilderFunction:
    Description: "Environment Builder Lambda Function ARN"
    Value: !GetAtt EnvironmentBuilderFunction.Arn

  ContentBucketName:
    Description: "コンテンツ保存用S3バケット名"
    Value: !Ref ContentBucket

  SessionsTableName:
    Description: "セッション管理用DynamoDBテーブル名"
    Value: !Ref SessionsTable

  MessagesTableName:
    Description: "メッセージ保存用DynamoDBテーブル名"
    Value: !Ref MessagesTable

  ProjectsTableName:
    Description: "プロジェクト管理用DynamoDBテーブル名"
    Value: !Ref ProjectsTable

  UserPoolId:
    Description: "Cognito User Pool ID"
    Value: !Ref UserPool

  UserPoolClientId:
    Description: "Cognito User Pool Client ID"
    Value: !Ref UserPoolClient

  IdentityPoolId:
    Description: "Cognito Identity Pool ID"
    Value: !Ref IdentityPool

  CognitoRegion:
    Description: "Cognito Region"
    Value: !Ref AWS::Region
